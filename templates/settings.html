{% extends "base.html" %}
{% block title %}设置 - 健身达人{% endblock %}

{% block extra_styles %}
<style>
    .settings-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        background: rgba(255, 255, 255, 0.03);
        transition: all .25s ease;
    }

    .settings-item:hover {
        background: rgba(255, 255, 255, 0.06);
    }

    .settings-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
    }

    .countdown {
        color: #22c55e;
        font-size: 0.75rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto space-y-6 fade-in">

    <!-- Header -->
    <div class="flex items-center gap-3">
        <a href="{{ url_for('profile') }}" class="w-9 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center
              text-slate-300 hover:text-slate-100 hover:bg-white/10 transition-all text-sm">
            ←
        </a>
        <div>
            <h2 class="text-2xl font-bold text-slate-100">设置</h2>
            <p class="text-sm text-slate-400">账号安全与操作</p>
        </div>
    </div>

    <!-- Change Password -->
    <div class="glass-card p-6 space-y-5">
        <div class="flex items-center gap-3 pb-3 border-b border-white/5">
            <div class="settings-icon bg-blue-500/15 text-blue-400">🔑</div>
            <div>
                <p class="font-semibold text-slate-200">修改密码</p>
                <p class="text-xs text-slate-500">验证码将发送至注册邮箱
                    <span class="text-slate-400 font-medium">{{ current_user.email or '（未绑定）' }}</span>
                </p>
            </div>
        </div>

        <div class="space-y-4" id="change-pwd-form">
            <!-- Send Code -->
            <div class="flex gap-3">
                <input type="text" id="pwd-code" maxlength="6" placeholder="输入6位验证码" class="input-field flex-1" />
                <button id="send-code-btn" onclick="sendCode()" class="btn-primary whitespace-nowrap px-4 py-2 text-sm">
                    发送验证码
                </button>
            </div>

            <div>
                <label class="block text-xs text-slate-400 mb-2">新密码（≥6位）</label>
                <input type="password" id="pwd-new" placeholder="输入新密码" class="input-field" />
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-2">确认新密码</label>
                <input type="password" id="pwd-confirm" placeholder="再次输入新密码" class="input-field" />
            </div>

            <button onclick="changePwd()" class="btn-primary w-full justify-center">
                ✅ 确认修改密码
            </button>
        </div>
    </div>

    <!-- Logout -->
    <div class="glass-card p-4">
        <a href="{{ url_for('logout') }}" onclick="return confirm('确定要退出登录吗？')" class="settings-item group cursor-pointer text-rose-400 hover:text-rose-300 hover:bg-rose-500/10
              hover:border-rose-500/30 w-full no-underline">
            <div class="settings-icon bg-rose-500/15 text-rose-400 group-hover:bg-rose-500/25">🚪</div>
            <div class="flex-1">
                <p class="font-semibold">退出登录</p>
                <p class="text-xs text-rose-400/70">退出当前账号</p>
            </div>
            <span class="text-slate-500 group-hover:text-rose-300 text-lg">›</span>
        </a>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    let countdown = null;

    function sendCode() {
        const btn = document.getElementById('send-code-btn');
        btn.disabled = true;
        btn.textContent = '发送中…';

        fetch('/api/send-change-pwd-code', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast(data.message, 'success');
                    let sec = 60;
                    btn.textContent = `${sec}s 后重发`;
                    countdown = setInterval(() => {
                        sec--;
                        if (sec <= 0) {
                            clearInterval(countdown);
                            btn.disabled = false;
                            btn.textContent = '重新发送';
                        } else {
                            btn.textContent = `${sec}s 后重发`;
                        }
                    }, 1000);
                } else {
                    showToast(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            })
            .catch(() => {
                showToast('网络错误，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '发送验证码';
            });
    }

    function changePwd() {
        const code = document.getElementById('pwd-code').value.trim();
        const np = document.getElementById('pwd-new').value;
        const cp = document.getElementById('pwd-confirm').value;

        if (!code) { showToast('请先获取并输入验证码', 'warning'); return; }
        if (!np) { showToast('请输入新密码', 'warning'); return; }
        if (np !== cp) { showToast('两次密码不一致', 'warning'); return; }

        fetch('/profile/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, new_password: np, confirm_password: cp })
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast(data.message, 'success');
                    setTimeout(() => { window.location.href = '/logout'; }, 1800);
                } else {
                    showToast(data.message, 'error');
                }
            })
            .catch(() => showToast('网络错误，请重试', 'error'));
    }
</script>
{% endblock %}
